<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urban Ally - Strategic Business Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0f172a; 
            color: #f8fafc;
            overflow-x: hidden;
        }
        .fade-enter-active { animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        /* Preveniamo conflitti di layout durante le transizioni */
        .content-area {
            min-height: 600px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const neighborhoodData = [
            {
                id: 'garden-district',
                name: 'Garden District',
                avgAge: 32,
                incomeLevel: 'Medium-High',
                successRate: '92%',
                psychographic: 'Young professionals, culture enthusiasts, career-oriented and socially active individuals.',
                dominantProfile: 'Millennials / Gen Z',
                topNeeds: ['Coworking Spaces', 'Gaming Centers', 'Gourmet Street Food'],
                infra: 'Requires East Bypass integration to manage high evening traffic flow.',
                marketTrend: '+12.4% YoY Growth'
            },
            {
                id: 'cloverdale',
                name: 'Cloverdale',
                avgAge: 45,
                incomeLevel: 'High',
                successRate: '87%',
                psychographic: 'Established families, focus on education, high purchasing power, quality-driven consumers.',
                dominantProfile: 'Families / Seniors',
                topNeeds: ['Healthcare Services', 'Luxury Boutiques', 'Educational Hubs'],
                infra: 'Main Road roundabout implementation to facilitate pedestrian accessibility.',
                marketTrend: '+4.2% Stability'
            },
            {
                id: 'chisholm',
                name: 'Chisholm',
                avgAge: 28,
                incomeLevel: 'Medium',
                successRate: '79%',
                psychographic: 'Growing population, dynamic, seeking convenience and practical everyday services.',
                dominantProfile: 'Students / Young Workers',
                topNeeds: ['Esports Arenas', 'Quality Discount Retail', 'Public Admin Offices'],
                infra: 'Bypass Exit at KM 14 is essential for efficient logistics and goods transport.',
                marketTrend: '+18.7% Emerging'
            }
        ];

        const App = () => {
            const [selectedId, setSelectedId] = useState(neighborhoodData[0].id);
            const [currentData, setCurrentData] = useState(neighborhoodData[0]);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            
            // Usiamo un ref per gestire l'inizializzazione delle icone in modo sicuro
            const mainRef = useRef(null);

            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [currentData, isAnalyzing]);

            const handleAnalyze = () => {
                if (isAnalyzing) return;
                setIsAnalyzing(true);
                
                // Transizione fluida senza smontare bruscamente i nodi
                setTimeout(() => {
                    const newData = neighborhoodData.find(n => n.id === selectedId);
                    setCurrentData(newData);
                    setIsAnalyzing(false);
                }, 800);
            };

            return (
                <div className="min-h-screen flex flex-col md:flex-row" ref={mainRef}>
                    {/* Sidebar */}
                    <aside className="w-full md:w-80 bg-slate-900/95 p-6 flex flex-col border-r border-slate-800 z-20">
                        <div className="flex items-center gap-3 mb-10">
                            <div className="p-2.5 bg-blue-600 rounded-xl shadow-lg shadow-blue-600/20">
                                <i data-lucide="layout-grid" className="text-white w-6 h-6"></i>
                            </div>
                            <div>
                                <h1 className="text-xl font-black tracking-tight text-white uppercase leading-none">URBAN ALLY</h1>
                                <span className="text-[10px] text-blue-400 font-bold tracking-[0.2em] uppercase">Intelligence Unit</span>
                            </div>
                        </div>

                        <nav className="flex-1 space-y-8">
                            <div>
                                <label className="text-[11px] font-bold text-slate-500 uppercase tracking-[0.15em] mb-4 block text-center md:text-left">District Selection</label>
                                <div className="space-y-2">
                                    {neighborhoodData.map(n => (
                                        <button 
                                            key={n.id}
                                            onClick={() => setSelectedId(n.id)}
                                            className={`w-full flex items-center justify-between p-3.5 rounded-xl text-sm font-medium transition-all ${
                                                selectedId === n.id 
                                                ? 'bg-slate-800 text-white ring-1 ring-white/10' 
                                                : 'text-slate-400 hover:bg-slate-800/50 hover:text-slate-200'
                                            }`}
                                        >
                                            {n.name}
                                            {selectedId === n.id && <div className="w-1.5 h-1.5 bg-blue-500 rounded-full shadow-[0_0_8px_#3b82f6]"></div>}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <button 
                                onClick={handleAnalyze}
                                disabled={isAnalyzing}
                                className="w-full bg-blue-600 hover:bg-blue-500 active:scale-[0.98] disabled:bg-slate-800/50 py-4 rounded-xl font-bold transition-all flex items-center justify-center gap-3 shadow-xl shadow-blue-900/40 text-white"
                            >
                                {isAnalyzing ? (
                                    <div className="w-5 h-5 border-2 border-white/20 border-t-white rounded-full animate-spin"></div>
                                ) : (
                                    <React.Fragment>
                                        <i data-lucide="zap" className="w-4 h-4 fill-white"></i> 
                                        <span>Process Match</span>
                                    </React.Fragment>
                                )}
                            </button>
                        </nav>

                        <div className="mt-auto pt-8 border-t border-slate-800/50 hidden md:block">
                            <div className="p-5 bg-slate-800/40 rounded-2xl border border-white/5 space-y-3">
                                <div className="flex items-center gap-2 text-[10px] text-blue-400 font-bold uppercase tracking-wider">
                                    <i data-lucide="database" className="w-3 h-3"></i> Core Statistics
                                </div>
                                <p className="text-xs text-slate-400 leading-relaxed">
                                    Analisi in tempo reale dei flussi demografici e dei pattern di mobilità urbana.
                                </p>
                            </div>
                        </div>
                    </aside>

                    {/* Main Report Area */}
                    <main className="flex-1 p-6 md:p-12 overflow-y-auto bg-[#0f172a] relative content-area">
                        <div className="absolute top-0 right-0 w-1/2 h-1/2 bg-blue-600/5 blur-[120px] rounded-full pointer-events-none"></div>
                        
                        <div className="max-w-5xl mx-auto space-y-10 relative z-10">
                            <header className="flex flex-col md:flex-row md:items-center justify-between gap-6">
                                <div>
                                    <nav className="flex items-center gap-2 text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">
                                        <span>Dashboard</span>
                                        <i data-lucide="chevron-right" className="w-3 h-3 text-slate-600"></i>
                                        <span className="text-blue-500">Analytics</span>
                                    </nav>
                                    <h2 className="text-5xl font-black text-white tracking-tight">Market Intelligence</h2>
                                    <p className="text-slate-400 mt-2 flex items-center gap-2 text-lg">
                                        Strategic insights for <span className="text-white font-semibold underline decoration-blue-500 decoration-2 underline-offset-4">{currentData.name}</span>
                                    </p>
                                </div>
                                <div className="flex flex-col items-end gap-2">
                                    <div className="px-4 py-2 bg-slate-800/80 backdrop-blur rounded-full text-[10px] font-black text-slate-300 uppercase tracking-widest border border-white/10 flex items-center gap-2">
                                        <span className="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
                                        AI-Engine Active
                                    </div>
                                    <span className="text-[10px] text-slate-500 font-medium italic">Alleato Urbano Strategico</span>
                                </div>
                            </header>

                            {isAnalyzing ? (
                                <div className="py-32 text-center space-y-8 fade-enter-active">
                                    <div className="relative inline-block">
                                        <div className="w-24 h-24 border-4 border-blue-600/10 border-t-blue-500 rounded-full animate-spin"></div>
                                        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2">
                                            <i data-lucide="scan-eye" className="w-8 h-8 text-blue-400 animate-pulse"></i>
                                        </div>
                                    </div>
                                    <div className="space-y-3">
                                        <h3 className="text-2xl font-black text-white tracking-tight">Processing Big Data Hub...</h3>
                                        <p className="text-slate-400 max-w-sm mx-auto text-sm font-medium">
                                            Correlazione tra valori immobiliari e densità demografica comportamentale.
                                        </p>
                                    </div>
                                </div>
                            ) : (
                                <div className="space-y-8 fade-enter-active">
                                    {/* Metrics Grid */}
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                                        <div className="glass-card p-6 rounded-[2rem] hover:bg-slate-800/60 transition-colors group">
                                            <p className="text-[10px] text-slate-500 font-bold uppercase mb-2 tracking-wider">Median Age</p>
                                            <p className="text-4xl font-black text-white group-hover:text-blue-400 transition-colors">{currentData.avgAge}</p>
                                            <div className="mt-2 text-[10px] text-slate-400">Target Segment Focus</div>
                                        </div>
                                        <div className="glass-card p-6 rounded-[2rem]">
                                            <p className="text-[10px] text-slate-500 font-bold uppercase mb-2 tracking-wider">Income Tier</p>
                                            <p className="text-3xl font-black text-white uppercase tracking-tight">{currentData.incomeLevel}</p>
                                            <div className="mt-2 text-[10px] text-slate-400">Purchasing Power Index</div>
                                        </div>
                                        <div className="glass-card p-6 rounded-[2rem]">
                                            <p className="text-[10px] text-slate-500 font-bold uppercase mb-2 tracking-wider">Compatibility</p>
                                            <p className="text-4xl font-black text-emerald-400">{currentData.successRate}</p>
                                            <div className="mt-2 text-[10px] text-emerald-500/70 font-bold">High Potential</div>
                                        </div>
                                        <div className="glass-card p-6 rounded-[2rem]">
                                            <p className="text-[10px] text-slate-500 font-bold uppercase mb-2 tracking-wider">Market Trend</p>
                                            <p className="text-xl font-black text-blue-400">{currentData.marketTrend}</p>
                                            <div className="mt-2 text-[10px] text-slate-400">Projected 12m Performance</div>
                                        </div>
                                    </div>

                                    {/* Psychographic Insight Hero */}
                                    <div className="bg-blue-600 rounded-[3rem] p-8 md:p-14 shadow-2xl shadow-blue-900/40 relative overflow-hidden group">
                                        <div className="relative z-10 max-w-2xl">
                                            <div className="flex items-center gap-3 mb-6">
                                                <span className="px-3 py-1 bg-white/20 backdrop-blur rounded-full text-[10px] font-black text-white uppercase tracking-widest border border-white/20">
                                                    Deep Profile Analysis
                                                </span>
                                            </div>
                                            <h3 className="text-2xl md:text-5xl font-black text-white leading-[1.1] mb-8 transition-transform group-hover:scale-[1.01]">
                                                "{currentData.psychographic}"
                                            </h3>
                                            <div className="flex flex-wrap gap-3">
                                                <div className="flex items-center gap-2 px-5 py-2.5 bg-white/10 rounded-2xl border border-white/10 text-sm font-bold text-white">
                                                    <i data-lucide="users" className="w-4 h-4"></i>
                                                    Core: {currentData.dominantProfile}
                                                </div>
                                                <div className="flex items-center gap-2 px-5 py-2.5 bg-black/20 rounded-2xl border border-white/5 text-sm font-bold text-blue-100">
                                                    <i data-lucide="shield-check" className="w-4 h-4 text-emerald-400"></i>
                                                    AI Strategy Verified
                                                </div>
                                            </div>
                                        </div>
                                        <div className="absolute -bottom-10 -right-10 opacity-10 rotate-12 group-hover:rotate-0 transition-transform duration-700">
                                            <i data-lucide="cpu" className="w-80 h-80 text-white"></i>
                                        </div>
                                    </div>

                                    {/* Bottom Grid */}
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                        <div className="glass-card p-8 rounded-[2.5rem] relative overflow-hidden">
                                            <div className="flex items-center justify-between mb-8">
                                                <h4 className="font-black text-white uppercase text-xs tracking-[0.2em] flex items-center gap-3">
                                                    <div className="w-8 h-8 rounded-lg bg-blue-500/20 flex items-center justify-center">
                                                        <i data-lucide="shopping-cart" className="text-blue-400 w-4 h-4"></i>
                                                    </div>
                                                    Merchant Opportunities
                                                </h4>
                                            </div>
                                            <div className="space-y-4">
                                                {currentData.topNeeds.map((need, i) => (
                                                    <div key={i} className="flex items-center gap-4 p-4 rounded-2xl bg-slate-800/30 border border-white/5 hover:bg-slate-800/50 transition-colors group">
                                                        <div className="flex-shrink-0 w-10 h-10 rounded-xl bg-slate-800 flex items-center justify-center font-bold text-blue-400 text-sm group-hover:bg-blue-600 group-hover:text-white transition-all">
                                                            {i+1}
                                                        </div>
                                                        <span className="text-slate-200 font-bold text-lg">{need}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="bg-amber-500/5 border border-amber-500/10 p-8 rounded-[2.5rem] flex flex-col justify-between group">
                                            <div>
                                                <h4 className="font-black text-amber-500 mb-6 flex items-center gap-3 uppercase text-xs tracking-[0.2em]">
                                                    <div className="w-8 h-8 rounded-lg bg-amber-500/10 flex items-center justify-center">
                                                        <i data-lucide="map-pin" className="w-4 h-4 text-amber-500"></i>
                                                    </div>
                                                    Urban Logistics Framework
                                                </h4>
                                                <div className="relative">
                                                    <p className="text-xl text-amber-100/90 leading-relaxed font-medium italic border-l-4 border-amber-500/40 pl-6 py-2">
                                                        "{currentData.infra}"
                                                    </p>
                                                </div>
                                            </div>
                                            <div className="mt-8 pt-8 border-t border-amber-500/10 flex items-center justify-between">
                                                <span className="text-[10px] font-bold text-amber-500/60 uppercase tracking-widest">Impact Level: Critical</span>
                                                <i data-lucide="trending-up" className="w-5 h-5 text-amber-500/40 group-hover:translate-x-1 transition-transform"></i>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
